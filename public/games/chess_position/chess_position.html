    <script>
        (function () {
            const applyThemeSettings = () => {
                try {
                    const savedStep = localStorage.getItem('themeStep');
                    const savedColor = localStorage.getItem('accentColor');
                    const savedColorSecondary = localStorage.getItem('accentColorSecondary');
                    const savedColorRecord = localStorage.getItem('recordColor');
                    const savedOpaque = localStorage.getItem('globalOpaque');

                    let savedLang = localStorage.getItem('siteLanguage');
                    if (!savedLang) {
                        const browserLang = navigator.language || navigator.userLanguage;
                        savedLang = browserLang.startsWith('fr') ? 'fr' : 'en';
                    }

                    const savedPatternMode = localStorage.getItem('patternMode');
                    const oldHidePattern = localStorage.getItem('hideDotPattern');
                    let modeToApply = 'dots';

                    if (savedPatternMode) {
                        modeToApply = savedPatternMode;
                    } else if (oldHidePattern === 'true') {
                        modeToApply = 'none';
                    }

                    const savedOpacity = localStorage.getItem('patternOpacity') || '50';
                    document.documentElement.style.setProperty('--pattern-opacity', savedOpacity / 100);
                    document.documentElement.setAttribute('data-pattern', modeToApply);
                    document.documentElement.setAttribute('lang', savedLang);

                    const savedColor3 = localStorage.getItem('customBgColor');
                    if (savedColor3) {
                        document.documentElement.style.setProperty('--bg-main', savedColor3);
                    } else {
                        document.documentElement.style.removeProperty('--bg-main');
                    }

                    const savedColor4 = localStorage.getItem('customCardBgColor');
                    if (savedColor4) {
                        document.documentElement.style.setProperty('--card-bg', savedColor4);
                    } else {
                        document.documentElement.style.removeProperty('--card-bg');
                    }

                    if (savedColor) document.documentElement.style.setProperty('--accent-color', savedColor);
                    if (savedColorSecondary) document.documentElement.style.setProperty('--accent-color-secondary', savedColorSecondary);
                    if (savedColorRecord) document.documentElement.style.setProperty('--record-color', savedColorRecord);

                    if (savedStep) {
                        document.documentElement.classList.remove('theme-lvl-1', 'theme-lvl-2', 'theme-lvl-3', 'theme-lvl-4', 'theme-lvl-5', 'dark-dominant');
                        document.documentElement.classList.add('theme-lvl-' + savedStep);
                        if (parseInt(savedStep) >= 3) {
                            document.documentElement.classList.add('dark-dominant');
                        }
                    }

                    if (savedOpaque === 'true' || savedOpaque === null) {
                        document.documentElement.classList.add('global-opaque');
                    } else {
                        document.documentElement.classList.remove('global-opaque');
                    }

                } catch (e) { console.error(e); }
            };

            applyThemeSettings();

            window.addEventListener('pageshow', (event) => {
                if (event.persisted) {
                    applyThemeSettings();
                } else {
                    setTimeout(applyThemeSettings, 10);
                }
            });

            window.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') applyThemeSettings();
            });
        })();
</script>

    <div id="settings-panel" class="panel-hidden" aria-hidden="true">
        <h3 data-i18n="chess_position.settings.title">Configuration</h3>

        <div class="mode-switch-wrapper">
            <input type="radio" id="toggle-ranked" name="mode-toggle" value="ranked" checked>
            <label for="toggle-ranked" data-i18n="chess_position.intro.ranked">CLASSÉ</label>

            <input type="radio" id="toggle-sandbox" name="mode-toggle" value="sandbox">
            <label for="toggle-sandbox" data-i18n="chess_position.intro.sandbox">LIBRE</label>

            <div class="mode-slider"></div>
        </div>

        <div class="separator" style="margin-top: 5px;"></div>

        <div class="setting-group" id="settings-ranked-group">
            <div class="setting-row">
                <label for="ranked-lives-val" data-i18n="chess_position.settings.lives">Vies :</label>
                <select id="ranked-lives-val" class="settings-select">
                    <option value="3" data-i18n="chess_position.settings.lives_3">3 Vies</option>
                    <option value="1" data-i18n="chess_position.settings.lives_1">1 Vie</option>
                </select>
            </div>
            <div class="setting-row" style="margin-top: 15px;">
                <label for="ranked-time-val" data-i18n="chess_position.settings.display_time">Affichage (ms) :</label>
                <select id="ranked-time-val" class="settings-select">
                    <option value="4000">4000ms</option>
                    <option value="2000">2000ms</option>
                </select>
            </div>
        </div>

        <div class="setting-group" id="settings-sandbox-group" style="display: none;">
            <div class="setting-row">
                <label for="lives-val" data-i18n="chess_position.settings.lives">Vies :</label>
                <input type="number" id="lives-val" value="3" min="0" max="10">
            </div>
            <p class="hint-text" data-i18n="chess_position.settings.lives_hint">0 = Vies infinies.</p>

            <div class="setting-row" style="margin-top: 15px;">
                <label for="display-time-val" data-i18n="chess_position.settings.display_time">Affichage (ms) :</label>
                <input type="number" id="display-time-val" value="4000" min="500" max="10000" step="500">
            </div>
            <p class="hint-text" data-i18n="chess_position.settings.display_time_hint">Temps de mémorisation.</p>
        </div>

        <div class="separator"></div>

        <div class="settings-actions">
            <button id="close-settings" class="secondary-btn"
                data-i18n="chess_position.settings.cancel">ANNULER</button>
            <button id="save-settings-btn" class="primary-btn"
                data-i18n="chess_position.settings.save">APPLIQUER</button>
        </div>
    </div>
